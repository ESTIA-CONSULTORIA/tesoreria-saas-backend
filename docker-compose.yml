version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tesoreria-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: tesoreria
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: tesoreria-frontend
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_SOCKET_URL: http://localhost:3000

  db:
    image: postgres:16-alpine
    container_name: tesoreria-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tesoreria
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: tesoreria-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  postgres_data:
